<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Migrasi Database HRIS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Library SheetJS untuk membaca Excel -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body class="bg-gray-100 min-h-screen p-10">

    <div class="max-w-3xl mx-auto bg-white p-8 rounded-xl shadow-lg border-t-8 border-red-600">
        <h1 class="text-2xl font-bold text-gray-800 mb-2">Alat Migrasi Database (Excel ke Firebase)</h1>
        <p class="text-gray-600 mb-6">Pilih file <span class="font-bold text-red-600">Data_Pengajuan.xlsx</span> untuk mengunggah otomatis Master Karyawan ke sistem.</p>

        <div class="mb-6 p-4 border-2 border-dashed border-gray-300 rounded-lg text-center">
            <input type="file" id="fileUpload" accept=".xlsx, .xls" class="block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-red-50 file:text-red-700 hover:file:bg-red-100"/>
        </div>

        <button id="btnMigrasi" class="w-full bg-gray-400 text-white font-bold py-3 rounded-lg cursor-not-allowed" disabled>
            Mulai Migrasi Data Karyawan
        </button>

        <!-- Log Progress -->
        <div id="logArea" class="mt-6 bg-gray-900 text-green-400 font-mono text-sm p-4 rounded-lg h-48 overflow-y-auto hidden">
            <p>> Menunggu file Excel...</p>
        </div>
    </div>

    <script type="module">
        import { doc, setDoc } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-firestore.js";
        import { db } from "./js/firebase-config.js"; // Pastikan path ini benar mengarah ke config Anda

        const fileUpload = document.getElementById('fileUpload');
        const btnMigrasi = document.getElementById('btnMigrasi');
        const logArea = document.getElementById('logArea');
        let excelData = [];

        function cetakLog(pesan) {
            logArea.classList.remove('hidden');
            logArea.innerHTML += `<p>> ${pesan}</p>`;
            logArea.scrollTop = logArea.scrollHeight;
        }

        // 1. Membaca Excel saat file dipilih
        fileUpload.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if(!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                const data = new Uint8Array(e.target.result);
                const workbook = XLSX.read(data, {type: 'array'});
                
                // Ambil khusus sheet "Master Karyawan"
                const namaSheet = "Master Karyawan";
                if(!workbook.SheetNames.includes(namaSheet)) {
                    alert("Sheet Master Karyawan tidak ditemukan!");
                    return;
                }

                const worksheet = workbook.Sheets[namaSheet];
                excelData = XLSX.utils.sheet_to_json(worksheet);
                
                cetakLog(`File terbaca! Ditemukan ${excelData.length} baris data karyawan.`);
                
                // Aktifkan tombol
                btnMigrasi.disabled = false;
                btnMigrasi.classList.remove('bg-gray-400', 'cursor-not-allowed');
                btnMigrasi.classList.add('bg-red-600', 'hover:bg-red-700', 'cursor-pointer');
            };
            reader.readAsArrayBuffer(file);
        });

        // 2. Eksekusi Migrasi ke Firebase
        btnMigrasi.addEventListener('click', async () => {
            btnMigrasi.disabled = true;
            btnMigrasi.innerText = "Memproses Migrasi...";

            let berhasil = 0;
            let gagal = 0;

            for (let row of excelData) {
                try {
                    // Sanitasi NIK: Pastikan string, hapus spasi & karakter aneh
                    if(!row['NIK_Karyawan']) continue; 
                    
                    // Terkadang Excel membaca angka besar sebagai eksponensial, kita paksa jadi string presisi
                    let nikMentah = String(row['NIK_Karyawan']).replace(/\D/g, ''); 
                    
                    const payloadKaryawan = {
                        NIK: nikMentah,
                        Nama: row['Nama_Karyawan'] || "-",
                        Cabang: row['CABANG'] || "-",
                        Jabatan: row['JABATAN'] || "-",
                        Divisi: row['DIVISI'] || "-",
                        TanggalJoin: row['TANGGAL JOIN'] ? String(row['TANGGAL JOIN']) : "-",
                        Email: row['EMAIL'] || "-",
                        SisaCutiTahunan: row['jatah_tahunan'] ? parseInt(row['jatah_tahunan']) : 0,
                        TerpakaiTahunan: row['Terpakai Tahunan'] ? parseInt(row['Terpakai Tahunan']) : 0
                    };

                    // Push ke Firebase
                    await setDoc(doc(db, "master_karyawan", nikMentah), payloadKaryawan);
                    cetakLog(`Sukses menyimpan: ${nikMentah} - ${payloadKaryawan.Nama}`);
                    berhasil++;

                } catch (error) {
                    console.error(error);
                    cetakLog(`<span class="text-red-500">Gagal menyimpan NIK: ${row['NIK_Karyawan']}</span>`);
                    gagal++;
                }
            }

            cetakLog(`<b>MIGRASI SELESAI!</b> Berhasil: ${berhasil}, Gagal: ${gagal}`);
            btnMigrasi.innerText = "Migrasi Selesai";
        });
    </script>
</body>
</html>
