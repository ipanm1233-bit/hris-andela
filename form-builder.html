<div class="w-full h-full flex flex-col md:flex-row bg-gray-50 overflow-hidden">
    
    <div class="w-full md:w-64 bg-white border-b md:border-b-0 md:border-r border-gray-200 flex flex-col shrink-0">
        <div class="p-4 border-b border-gray-100 flex justify-between items-center bg-gray-50/50">
             <h3 class="font-extrabold text-gray-800 text-sm tracking-tight">Katalog Form Terdaftar</h3>
             <button id="btnNewForm" class="p-1.5 text-red-600 hover:text-red-800 hover:bg-red-50 rounded-lg transition" title="Buat Form Baru">
                 <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
             </button>
        </div>
        <div id="formListContainer" class="flex-1 overflow-y-auto custom-scrollbar p-2 space-y-1 bg-white">
            <div class="p-4 text-center text-gray-400 text-xs italic">Memuat daftar formulir...</div>
        </div>
    </div>

    <div class="flex-1 overflow-y-auto custom-scrollbar p-4 lg:p-8 bg-gray-50">
         <div class="max-w-4xl mx-auto space-y-6">
             
             <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center p-6 bg-white rounded-2xl border border-gray-200 shadow-sm gap-4">
                 <div class="flex items-center">
                     <div class="w-12 h-12 bg-red-50 text-red-600 rounded-xl flex items-center justify-center mr-4 shrink-0 border border-red-100">
                         <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6V4m0 2a2 2 0 100 4m0-4a2 2 0 110 4m-6 8a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4m6 6v10m6-2a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4"></path></svg>
                     </div>
                     <div>
                         <h1 class="text-lg font-black text-gray-800 tracking-tight">Visual Form Builder ISO</h1>
                         <p class="text-xs text-gray-500 mt-0.5">Atur skema kolom input, alur otorisasi persetujuan, dan hak akses jabatan.</p>
                     </div>
                 </div>
                 <button id="btnInitForm" class="w-full sm:w-auto bg-red-600 hover:bg-red-700 text-white font-bold py-2.5 px-5 rounded-xl text-sm shadow-md transition flex items-center justify-center transform hover:-translate-y-0.5">
                     <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                     Form Baru
                 </button>
             </div>

             <div id="configContainer" class="hidden space-y-6 pb-24">
                 
                 <div class="bg-white rounded-2xl border border-gray-200 shadow-sm overflow-hidden">
                     <div class="bg-gray-50 px-6 py-4 border-b border-gray-200 flex items-center">
                         <div class="w-2 h-4 bg-red-600 rounded-full mr-2.5"></div>
                         <h3 class="font-extrabold text-gray-800 text-sm uppercase tracking-wider">1. Informasi Utama Form</h3>
                     </div>
                     <div class="p-6 space-y-5">
                         <div>
                             <label class="block text-xs font-bold text-gray-500 uppercase mb-1.5 tracking-wide">Nama / Judul Formulir</label>
                             <input type="text" id="cfgNamaForm" class="w-full px-4 py-3 border border-gray-300 rounded-xl text-sm focus:ring-2 focus:ring-red-500 focus:outline-none font-bold text-gray-700 transition shadow-sm" placeholder="Contoh: Permohonan Cuti">
                         </div>
                         
                         <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                             <div>
                                  <label class="block text-xs font-bold text-gray-500 uppercase mb-1.5 tracking-wide">ID Form (Unik / Kode ISO)</label>
                                  <input type="text" id="cfgIdForm" class="w-full px-4 py-3 border border-gray-300 rounded-xl text-sm font-mono uppercase bg-gray-50 focus:bg-white focus:ring-2 focus:ring-red-500 focus:outline-none transition shadow-sm" placeholder="F-HR-01">
                             </div>
                             <div>
                                  <label class="block text-xs font-bold text-gray-500 uppercase mb-1.5 tracking-wide">Kategori Kelompok Form</label>
                                  <input type="text" id="cfgTipeForm" class="w-full px-4 py-3 border border-gray-300 rounded-xl text-sm uppercase focus:ring-2 focus:ring-red-500 focus:outline-none transition shadow-sm" placeholder="CUTI, DINAS, KAS, ASET">
                             </div>
                         </div>

                         <div>
                             <label class="block text-xs font-bold text-gray-500 uppercase mb-1.5 tracking-wide">Tembusan Email Saat Full Approve (Pisahkan Koma)</label>
                             <input type="text" id="cfgTembusan" class="w-full px-4 py-3 border border-blue-200 bg-blue-50/50 rounded-xl text-sm text-blue-800 font-semibold focus:ring-2 focus:ring-blue-500 focus:outline-none transition shadow-sm" placeholder="HRD, GM, FINANCE">
                         </div>
                     </div>
                 </div>

                 <div class="bg-white rounded-2xl border border-gray-200 shadow-sm overflow-hidden">
                     <div class="bg-gray-50 px-6 py-4 border-b border-gray-200 flex items-center">
                         <div class="w-2 h-4 bg-red-600 rounded-full mr-2.5"></div>
                         <h3 class="font-extrabold text-gray-800 text-sm uppercase tracking-wider">2. Alur Persetujuan (Approval Flow)</h3>
                     </div>
                     <div class="p-6 space-y-4">
                         <div id="approvalFlowRender" class="flex flex-wrap items-center gap-3 p-4 border border-gray-200 rounded-xl bg-gray-50 min-h-[70px]"></div>
                         
                         <div class="flex flex-col sm:flex-row items-center gap-3">
                             <select id="addRoleSelect" class="w-full sm:w-auto px-4 py-2.5 border border-gray-300 rounded-xl text-sm bg-white focus:outline-none focus:ring-2 focus:ring-red-500 font-bold text-gray-700">
                                 <option value="ATASAN">ATASAN LANGSUNG</option>
                                 <option value="HRD">HRD</option>
                                 <option value="FINANCE">FINANCE</option>
                                 <option value="GM">GM / DIREKTUR</option>
                             </select>
                             <button type="button" id="btnAddApproval" class="w-full sm:w-auto bg-gray-800 hover:bg-gray-900 text-white text-xs px-5 py-3 rounded-xl font-bold transition flex items-center justify-center shadow-sm">
                                 + Tambah ke Antrean
                             </button>
                         </div>
                     </div>
                 </div>

                 <div class="bg-white rounded-2xl border border-gray-200 shadow-sm overflow-hidden">
                     <div class="bg-gray-50 px-6 py-4 border-b border-gray-200 flex justify-between items-center">
                         <div class="flex items-center">
                             <div class="w-2 h-4 bg-red-600 rounded-full mr-2.5"></div>
                             <h3 class="font-extrabold text-gray-800 text-sm uppercase tracking-wider">3. Desain Kolom Isian (Fields)</h3>
                         </div>
                         <button type="button" id="btnAddField" class="text-red-700 bg-red-50 hover:bg-red-100 text-xs font-bold px-4 py-2 rounded-xl transition border border-red-100 shadow-sm">
                             + Tambah Field Baru
                         </button>
                     </div>
                     <div id="fieldsContainer" class="p-6 space-y-4 bg-gray-50/50"></div>
                 </div>

                 <div class="flex flex-col sm:flex-row justify-between items-center pt-4 border-t border-gray-200 gap-4">
                     <button type="button" id="btnDeleteForm" class="w-full sm:w-auto text-red-600 bg-red-50 hover:bg-red-100 px-5 py-3 rounded-xl font-bold text-sm transition flex items-center justify-center hidden">
                         Hapus Form Ini
                     </button>
                     <div class="hidden sm:block flex-1"></div>
                     <button type="button" id="btnSaveConfig" class="w-full sm:w-auto bg-red-600 hover:bg-red-700 text-white font-black py-3.5 px-8 rounded-xl shadow-md transition transform hover:-translate-y-0.5 flex items-center justify-center">
                         Simpan Semua Konfigurasi
                     </button>
                 </div>

             </div>
         </div>
    </div>
</div>
