<div class="h-full flex flex-col bg-gray-50 absolute inset-0">
    <div class="bg-white px-6 py-4 border-b border-gray-200 flex justify-between items-center shrink-0">
        <h2 class="text-lg font-bold text-gray-800">Form Builder (Konfigurasi)</h2>
        <div class="text-right">
             <p class="text-[10px] text-gray-400 font-bold uppercase tracking-wider">HARI INI</p>
             <p id="builderDateDisplay" class="text-xs font-bold text-gray-600">...</p>
        </div>
    </div>

    <div class="flex-1 flex overflow-hidden">
        
        <div class="w-64 bg-white border-r border-gray-200 flex flex-col shrink-0">
            <div class="p-4 border-b border-gray-100 flex justify-between items-center">
                 <h3 class="font-bold text-gray-700 text-sm">Daftar Formulir</h3>
                 <button id="btnNewForm" class="text-red-600 hover:text-red-800 transition" title="Buat Form Baru">
                     <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                 </button>
            </div>
            <div id="formListContainer" class="flex-1 overflow-y-auto custom-scrollbar p-2 space-y-1">
                <div class="p-4 text-center text-gray-400 text-xs italic">Memuat daftar formulir...</div>
            </div>
        </div>

        <div class="flex-1 overflow-y-auto custom-scrollbar p-6 lg:p-10 relative bg-gray-50">
             <div class="max-w-4xl mx-auto">
                 
                 <div class="flex justify-between items-center mb-8 bg-white p-4 rounded-xl border border-gray-100 shadow-sm">
                     <div class="flex items-center">
                         <div class="w-10 h-10 bg-red-50 text-red-600 rounded-lg flex items-center justify-center mr-4">
                             <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6V4m0 2a2 2 0 100 4m0-4a2 2 0 110 4m-6 8a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4m6 6v10m6-2a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4"></path></svg>
                         </div>
                         <div>
                             <h1 class="text-lg font-extrabold text-gray-800">Visual Form Builder</h1>
                             <p class="text-xs text-gray-500">Konfigurasi struktur formulir ISO dan skema otorisasi alur persetujuan.</p>
                         </div>
                     </div>
                     <button id="btnInitForm" class="bg-red-600 hover:bg-red-700 text-white font-bold py-2 px-4 rounded-lg text-sm shadow-sm transition flex items-center">
                         <svg class="w-4 h-4 mr-1.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                         Form Baru
                     </button>
                 </div>

                 <div id="configContainer" class="hidden space-y-6 pb-20">
                     
                     <div class="bg-white rounded-2xl border border-gray-200 shadow-sm overflow-hidden">
                         <div class="bg-gray-50 px-6 py-3 border-b border-gray-200 flex items-center">
                             <svg class="w-4 h-4 text-red-600 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                             <h3 class="font-bold text-gray-800 text-sm">Informasi Utama</h3>
                         </div>
                         <div class="p-6 space-y-5">
                             <div>
                                 <label class="block text-[10px] font-bold text-gray-500 uppercase tracking-wide mb-1">Nama / Judul Form</label>
                                 <input type="text" id="cfgNamaForm" class="w-full px-4 py-2.5 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-red-500 focus:outline-none" placeholder="Contoh: Permohonan Cuti">
                             </div>
                             <div class="flex gap-4">
                                 <div class="flex-1">
                                      <label class="block text-[10px] font-bold text-gray-500 uppercase tracking-wide mb-1">ID Form (Unik)</label>
                                      <input type="text" id="cfgIdForm" class="w-full px-4 py-2.5 border border-gray-300 rounded-lg text-sm font-mono uppercase bg-gray-50 focus:bg-white focus:ring-2 focus:ring-red-500 focus:outline-none" placeholder="F-HR-01">
                                 </div>
                                 <div class="flex-1">
                                      <label class="block text-[10px] font-bold text-gray-500 uppercase tracking-wide mb-1">Tipe / Kategori</label>
                                      <input type="text" id="cfgTipeForm" class="w-full px-4 py-2.5 border border-gray-300 rounded-lg text-sm uppercase focus:ring-2 focus:ring-red-500 focus:outline-none" placeholder="CUTI, DINAS, KAS">
                                 </div>
                             </div>
                             <div>
                                 <label class="block text-[10px] font-bold text-gray-500 uppercase tracking-wide mb-1">Tembusan Email Saat Full Approve (Pisahkan Koma)</label>
                                 <input type="text" id="cfgTembusan" class="w-full px-4 py-2.5 border border-blue-200 bg-blue-50 rounded-lg text-sm text-blue-800 focus:ring-2 focus:ring-blue-500 focus:outline-none" placeholder="HRD, GM, FINANCE">
                             </div>
                         </div>
                     </div>

                     <div class="bg-white rounded-2xl border border-gray-200 shadow-sm overflow-hidden">
                         <div class="bg-gray-50 px-6 py-3 border-b border-gray-200 flex justify-between items-center">
                             <div class="flex items-center">
                                 <svg class="w-4 h-4 text-red-600 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8.684 13.342C8.886 12.938 9 12.482 9 12c0-.482-.114-.938-.316-1.342m0 2.684a3 3 0 110-2.684m0 2.684l6.632 3.316m-6.632-6l6.632-3.316m0 0a3 3 0 105.367-2.684 3 3 0 00-5.367 2.684zm0 9.316a3 3 0 105.368 2.684 3 3 0 00-5.368-2.684z"></path></svg>
                                 <h3 class="font-bold text-gray-800 text-sm">Alur Persetujuan (Approval Flow)</h3>
                             </div>
                         </div>
                         <div class="p-6">
                             <div id="approvalFlowRender" class="flex flex-wrap items-center gap-2 mb-4 p-4 border border-gray-200 rounded-lg bg-gray-50 min-h-[60px]"></div>
                             <div class="flex items-center gap-3">
                                 <select id="addRoleSelect" class="px-4 py-2 border border-gray-300 rounded-lg text-sm bg-white focus:outline-none focus:ring-2 focus:ring-red-500">
                                     <option value="ATASAN">ATASAN LANGSUNG</option>
                                     <option value="HRD">HRD</option>
                                     <option value="FINANCE">FINANCE</option>
                                     <option value="GM">GM / DIREKTUR</option>
                                 </select>
                                 <button type="button" id="btnAddApproval" class="bg-gray-800 hover:bg-gray-900 text-white text-xs px-4 py-2.5 rounded-lg font-bold transition flex items-center shadow-sm">
                                     Tambah Role
                                 </button>
                             </div>
                         </div>
                     </div>

                     <div class="bg-white rounded-2xl border border-gray-200 shadow-sm overflow-hidden">
                         <div class="bg-gray-50 px-6 py-3 border-b border-gray-200 flex justify-between items-center">
                             <div class="flex items-center">
                                 <svg class="w-4 h-4 text-red-600 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 10h16M4 14h16M4 18h16"></path></svg>
                                 <h3 class="font-bold text-gray-800 text-sm">Susunan Kolom Isian (Fields)</h3>
                             </div>
                             <button type="button" id="btnAddField" class="text-red-600 bg-red-50 hover:bg-red-100 text-[10px] font-bold px-3 py-1.5 rounded-md transition border border-red-100">
                                 + Tambah Field
                             </button>
                         </div>
                         <div id="fieldsContainer" class="p-6 space-y-4"></div>
                     </div>

                     <div class="flex justify-between items-center pt-4 border-t border-gray-200">
                         <button type="button" id="btnDeleteForm" class="text-red-600 hover:bg-red-50 px-4 py-2 rounded-lg font-bold text-sm transition hidden">
                             Hapus Form Ini
                         </button>
                         <button type="button" id="btnSaveConfig" class="bg-red-600 hover:bg-red-700 text-white font-extrabold py-3 px-8 rounded-xl shadow-lg transition">
                             Simpan Konfigurasi
                         </button>
                     </div>

                 </div>
             </div>
        </div>
    </div>
</div>
